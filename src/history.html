<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lobi — Session History</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .history-page {
      width: 100%; height: 100%;
      display: flex;
      flex-direction: column;
      padding: 0 24px 24px;
    }

    .history-header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .session-list {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .session-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 14px;
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .session-score {
      font-size: 26px;
      font-weight: 800;
      letter-spacing: -1px;
      line-height: 1;
      flex-shrink: 0;
      width: 42px;
      text-align: center;
    }

    .session-meta {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .session-date {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
    }

    .session-details {
      font-size: 11px;
      color: var(--muted);
    }

    .session-peak {
      font-size: 11px;
      color: var(--muted);
      text-align: right;
      flex-shrink: 0;
    }

    .session-title-row {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .session-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
    }

    .rename-btn {
      background: none;
      border: none;
      cursor: pointer;
      padding: 2px 4px;
      color: var(--muted);
      border-radius: 4px;
      display: inline-flex;
      align-items: center;
      line-height: 0;
      opacity: 0.6;
    }
    .rename-btn:hover { background: var(--border); color: var(--text); opacity: 1; }
    .rename-btn svg { width: 11px; height: 11px; display: block; }

    .title-input {
      font-size: 13px;
      font-weight: 600;
      background: var(--surface);
      border: 1px solid var(--green);
      border-radius: 5px;
      padding: 1px 5px;
      color: var(--text);
      font-family: inherit;
      outline: none;
      flex: 1;
      min-width: 0;
    }

    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      font-size: 13px;
      gap: 8px;
      text-align: center;
    }

    .empty-icon { font-size: 36px; }
  </style>
</head>
<body>

<div class="history-page">

  <div class="drag-region history-header" style="padding-left:76px;">
    <span class="app-name">Session History</span>
  </div>

  <div class="session-list" id="session-list">
    <div class="empty-state" id="empty-state">
      <span class="empty-icon">📊</span>
      <span>No sessions yet.<br>End a session from the dashboard to save it.</span>
    </div>
  </div>

</div>

<script>
  function scoreColour(s) {
    return s >= 70 ? 'var(--green)' : s >= 40 ? 'var(--yellow)' : 'var(--red)'
  }

  function formatDuration(ms) {
    const m = Math.round(ms / 60_000)
    if (m < 60) return `${m}m`
    const h = Math.floor(m / 60)
    const rem = m % 60
    return rem > 0 ? `${h}h ${rem}m` : `${h}h`
  }

  function formatDate(ts) {
    const d    = new Date(ts)
    const now  = new Date()
    const isToday = d.toDateString() === now.toDateString()
    const yesterday = new Date(now)
    yesterday.setDate(now.getDate() - 1)
    const isYesterday = d.toDateString() === yesterday.toDateString()

    const time = d.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' })
    if (isToday)     return `Today, ${time}`
    if (isYesterday) return `Yesterday, ${time}`
    return d.toLocaleDateString([], { month: 'short', day: 'numeric' }) + `, ${time}`
  }

  const PENCIL_SVG = `<svg viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
    <path d="M12.146.146a.5.5 0 0 1 .708 0l3 3a.5.5 0 0 1 0 .708L4.854 15.854a.5.5 0 0 1-.353.146H1a.5.5 0 0 1-.5-.5v-3.5a.5.5 0 0 1 .146-.354L12.146.146zM11.207 2.5 13.5 4.793 14.793 3.5 12.5 1.207 11.207 2.5z"/>
  </svg>`

  function renderSessions(sessions) {
    const list = document.getElementById('session-list')

    if (!sessions.length) {
      list.innerHTML = `<div class="empty-state" id="empty-state">
        <span class="empty-icon">📊</span>
        <span>No sessions yet.<br>End a session from the dashboard to save it.</span>
      </div>`
      return
    }

    list.innerHTML = sessions.map(s => {
      const displayTitle = s.title || formatDate(s.startTime)
      return `
      <div class="session-card" data-start="${s.startTime}" data-title="${s.title ?? ''}">
        <div class="session-score" style="color:${scoreColour(s.avgScore)}">${s.avgScore}</div>
        <div class="session-meta">
          <div class="session-title-row">
            <span class="session-title">${displayTitle}</span>
            <button class="rename-btn" data-start="${s.startTime}" title="Rename">${PENCIL_SVG}</button>
          </div>
          <div class="session-details">${formatDuration(s.durationMs)} · ${s.insightCount} insight${s.insightCount !== 1 ? 's' : ''}</div>
        </div>
        <div class="session-peak">
          <div style="font-size:10px; margin-bottom:2px;">Peak</div>
          <div style="font-weight:700; color:${scoreColour(s.peakScore)}">${s.peakScore}</div>
        </div>
      </div>
    `}).join('')
  }

  async function load() {
    renderSessions(await window.lobi.getSessions())
  }

  // Inline rename via pencil button
  document.getElementById('session-list').addEventListener('click', async (e) => {
    const renameBtn = e.target.closest('.rename-btn')
    if (!renameBtn) return

    const startTime = Number(renameBtn.dataset.start)
    const card      = renameBtn.closest('.session-card')
    const titleRow  = card.querySelector('.session-title-row')
    const titleEl   = titleRow.querySelector('.session-title')
    const customTitle = card.dataset.title || ''

    const input = document.createElement('input')
    input.className   = 'title-input'
    input.value       = customTitle
    input.placeholder = formatDate(startTime)
    input.maxLength   = 60

    titleEl.replaceWith(input)
    renameBtn.style.display = 'none'
    input.focus()
    input.select()

    let committed = false
    async function commit() {
      if (committed) return
      committed = true
      const title = input.value.trim() || null
      await window.lobi.updateSession(startTime, title)
      load()
    }
    input.addEventListener('blur', commit)
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter')  { e.preventDefault(); input.blur() }
      if (e.key === 'Escape') { committed = true; load() }
    })
  })

  load()
</script>

</body>
</html>
