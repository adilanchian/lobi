appId: com.lobi.app
productName: Lobi

directories:
  output: dist

# ── macOS ────────────────────────────────────────────────────────────────────
mac:
  category: public.app-category.productivity
  icon: assets/macOS/lobi.icon

  identity: "Wind Down Studio, LLC (UWMZP3Q26H)"
  hardenedRuntime: true
  gatekeeperAssess: false

  entitlements: assets/entitlements.mac.plist
  entitlementsInherit: assets/entitlements.mac.plist

  # Built-in notarization reads APPLE_ID, APPLE_APP_SPECIFIC_PASSWORD, and APPLE_TEAM_ID from env.
  notarize: true

  # Shown in macOS permission dialogs
  extendInfo:
    NSCameraUsageDescription: "Lobi uses your camera to track eye movements and monitor focus. Video is processed locally and never leaves your device."
    NSMicrophoneUsageDescription: "Lobi does not use the microphone."

  target:
    - target: dmg
      arch: universal   # single installer for Intel + Apple Silicon
    - target: zip
      arch: universal   # required by electron-updater for macOS delta updates

dmg:
  title: "Lobi"
  icon: assets/macOS/icon-dark.icns
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications

# ── Auto-update — publishes to GitHub Releases ───────────────────────────────
# Set GH_TOKEN env var when running `npm run build` to publish.
# electron-updater checks for updates from this repo's releases automatically.
publish:
  provider: github
  owner: adilanchian
  repo: lobi

# ── Windows ───────────────────────────────────────────────────────────────────
win:
  icon: assets/windows/icon-dark.ico
  target:
    - target: nsis   # handles auto-updates natively, generates latest.yml
      arch: x64      # covers all Windows 10+ desktops/laptops
    - target: zip
      arch: x64

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
